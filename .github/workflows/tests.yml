name: tests

# Gate every PR and every push to main on the offline test suite. No API keys,
# no Apple secrets -- this only runs pytest in a clean venv with PyPI deps, which
# is exactly how a contributor's machine installs the rig (verified: 584 pass
# with `pip install -e .[dev] puppetmaster-ai`).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run when a new commit is pushed to the same PR/branch.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Floor (3.9, the requires-python minimum) + the dev interpreter (3.11),
        # on every OS users actually run: Linux, macOS, and Windows.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11"]
        exclude:
          # actions/setup-python has no CPython 3.9 build for arm64 macOS.
          # The 3.9 floor is still proven on Linux and Windows.
          - os: macos-latest
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (rig + dev extras + Puppetmaster from PyPI)
        run: |
          python -m pip install --upgrade pip
          # Floor matches the accounting/routing fixes this release needs.
          # Unpinned `puppetmaster-ai` + pip cache can leave CI on an older
          # wheel (e.g. 1.14.0) and fail fallback-pricing regressions.
          pip install -e ".[dev]" "puppetmaster-ai==1.20.1"

      - name: Run the offline test suite
        run: python -m pytest -q -p no:cacheprovider

  # Wave 6: named offline gate for full-auto safety invariants. Does not replace
  # the matrix above (3.9/3.11 x OS + frontend stay required). Live-key /
  # provider evals stay out — this selection is hermetic and marker-driven.
  full-auto-safety:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cover the POSIX and Windows command-policy surfaces without expanding
        # the main pytest matrix or dropping the 3.9 floor job.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (rig + dev extras + Puppetmaster from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "puppetmaster-ai==1.20.1"

      - name: Full-auto safety invariants (offline)
        run: python -m pytest -q -p no:cacheprovider -m full_auto_safety

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install + typecheck + build the renderer
        working-directory: webapp
        run: |
          npm ci
          npm run build
