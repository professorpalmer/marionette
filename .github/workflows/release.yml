name: release

# Build thin Electron shell installers on tag push. The packaged app bootstraps a
# source checkout on first launch; it does NOT bundle Python or a PyInstaller backend.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Hard gate: a tag build must prove the suite green before any installer is
  # built or uploaded. Releases can never ship from a red tree.
  test-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        # Floor (3.9, the requires-python minimum) + the dev interpreter (3.11).
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (rig + dev extras + Puppetmaster from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "puppetmaster-ai>=1.19.6"

      - name: Run the offline test suite
        run: python -m pytest -q -p no:cacheprovider

  build:
    needs: test-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install uv (Unix)
        if: runner.os != 'Windows'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: irm https://astral.sh/uv/install.ps1 | iex

      - name: Build renderer + package Electron shell
        working-directory: webapp
        shell: bash
        env:
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          npm ci
          npm run dist -- --${{ matrix.platform }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            webapp/release/*.dmg
            webapp/release/*.zip
            webapp/release/*.exe
            webapp/release/*.AppImage
            webapp/release/*.blockmap
            webapp/release/latest*.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
