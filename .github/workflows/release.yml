name: release

# Build thin Electron shell installers on tag push. The packaged app bootstraps a
# source checkout on first launch; it does NOT bundle Python or a PyInstaller backend.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Hard gate: a tag build must prove the suite green before any installer is
  # built or uploaded. Releases can never ship from a red tree.
  test-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        # Floor (3.9, the requires-python minimum) + the dev interpreter (3.11).
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (rig + dev extras + Puppetmaster from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "puppetmaster-ai==1.20.0"

      - name: Run the offline test suite
        run: python -m pytest -q -p no:cacheprovider

  build:
    needs: test-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install uv (Unix)
        if: runner.os != 'Windows'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: irm https://astral.sh/uv/install.ps1 | iex

      - name: Build renderer + package Electron shell
        working-directory: webapp
        shell: bash
        env:
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          npm ci
          npm run dist -- --${{ matrix.platform }}

      # Stage installers as Actions artifacts. Do NOT call the Releases API from
      # the matrix — three parallel softprops uploads race and flake hard when
      # GitHub returns HTML 503/unicorn pages for /releases.
      - name: Stage installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            webapp/release/*.dmg
            webapp/release/*.zip
            webapp/release/*.exe
            webapp/release/*.AppImage
            webapp/release/*.blockmap
            webapp/release/latest*.yml
          if-no-files-found: warn
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout so `gh release create --generate-notes` can read git history.
      # Without this, publish only has downloaded artifacts and gh fails with
      # "fatal: not a git repository".
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download staged installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: installer-*
          merge-multiple: true

      - name: Upload assets to GitHub Release (retry on API flakes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Keep the finder free of escaped parens — Actions wraps this into a
          # temp .sh and `find \( ... \)` has failed with syntax errors.
          mapfile -t ALL < <(find dist -type f | sort)
          FILTERED=()
          for f in "${ALL[@]}"; do
            case "$f" in
              *.dmg|*.zip|*.exe|*.AppImage|*.blockmap|*latest*.yml)
                FILTERED+=("$f")
                ;;
            esac
          done
          if [ "${#FILTERED[@]}" -eq 0 ]; then
            echo "No installer assets found under dist/" >&2
            find dist -type f | head -n 80 || true
            exit 1
          fi
          echo "Uploading ${#FILTERED[@]} asset(s) to $TAG:"
          printf '  %s\n' "${FILTERED[@]}"

          # Ensure the release row exists (notes may already be present).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes
          fi

          for attempt in 1 2 3 4 5 6 7 8; do
            echo "release upload attempt ${attempt}/8"
            if gh release upload "$TAG" "${FILTERED[@]}" --clobber; then
              echo "Upload succeeded"
              exit 0
            fi
            sleep $((attempt * 20))
          done
          echo "Exhausted retries uploading release assets" >&2
          exit 1
