<!--
  LEGACY FALLBACK browser GUI -- do NOT treat this as the real UI.
  The shipping desktop app renders through webapp/src (React/TS), whose main
  conversation view lives in webapp/src/components/Conversation.tsx.
  This harness/web/ directory is only the minimal, no-build browser fallback
  served by harness/server.py. Future edits to the actual product UI must
  target webapp/src, NOT this file. Touch this file only for browser-fallback
  fixes. See docs/LEGACY_FRONTEND.md for details.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Puppetmaster Harness</title>
<link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div id="app">
  <!-- LEFT: nav -->
  <aside id="nav">
    <div class="brand"><span class="mark">PM</span><span class="title">Harness</span></div>
    <button class="nav-btn active" id="new-chat">New chat</button>
    <div class="nav-section">PILOT</div>
    <div id="driver-card" class="driver-card">
      <select id="pilot-picker" class="pilot-picker"></select>
      <div class="driver-meta" id="driver-meta">--</div>
    </div>
    <div class="nav-section">SESSION JOBS</div>
    <div id="job-list" class="job-list"></div>
  </aside>

  <!-- CENTER: conversation -->
  <main id="center">
    <header id="center-head">
      <span id="task-title">PM-Native Harness</span>
      <span id="status-pill" class="pill idle">idle</span>
    </header>
    <div id="feed"></div>
    <div id="attachments"></div>
    <form id="composer">
      <button id="attach" type="button" title="Attach image">+</button>
      <input id="file" type="file" accept="image/*" multiple hidden/>
      <textarea id="prompt" rows="1" autocomplete="off"
             placeholder="Message the pilot. It plans, investigates via swarms, and explains."></textarea>
      <button id="send" type="submit">Send</button>
      <button id="stop" type="button" hidden>Stop</button>
    </form>
  </main>

  <!-- RIGHT: durable state -->
  <aside id="state">
    <header class="state-head">DURABLE STATE</header>
    <div class="state-sub">Artifacts (live)</div>
    <div id="artifact-list" class="artifact-list">
      <div class="empty">Findings appear here as the pilot investigates.</div>
    </div>
  </aside>
</div>
<script src="/app.js"></script>
</body>
</html>
